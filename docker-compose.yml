version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: artist_os_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-artist_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-artist_secure_pass_2026}
      POSTGRES_DB: ${DB_NAME:-artist_os_db}
    ports:
      - "5432:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-artist_admin} -d $${POSTGRES_DB:-artist_os_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
